<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
  <div class="container mx-auto px-4 py-8 max-w-md">
    <div class="bg-white p-8 rounded-lg shadow-md">
      <h1 class="text-2xl font-bold mb-6 text-center">Регистрация</h1>
      <form id="registerForm">
        <div class="mb-4">
          <label class="block text-sm font-medium mb-2">Логин</label>
          <input type="text" id="login" required class="w-full p-3 border rounded-lg">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium mb-2">Пароль</label>
          <input type="password" id="password" required class="w-full p-3 border rounded-lg">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium mb-2">Email</label>
          <input type="email" id="email" required class="w-full p-3 border rounded-lg">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2">Роль</label>
          <select id="role" required class="w-full p-3 border rounded-lg">
            <option value="student">Ученик</option>
            <option value="teacher">Учитель</option>
          </select>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Зарегистрироваться</button>
      </form>
      <p class="mt-4 text-center text-gray-600">
        Уже есть аккаунт? <a href="login.html" class="text-blue-600 hover:underline">Войти</a>
      </p>
    </div>
  </div>

  <script src="scripts/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userData = {
        login: document.getElementById('login').value,
        password: document.getElementById('password').value,
        email: document.getElementById('email').value,
        role: document.getElementById('role').value
      };

      try {
        const user = await registerUser(userData);
        localStorage.setItem('user', JSON.stringify(user));
        // Перенаправление на главную страницу
        window.location.href = 'courses.html';
      } catch (error) {
        alert(`Ошибка: ${error.message}`);
      }
    });
  </script>
</body>
</html>
